# smoke_test.cfg — consumer-side ld65 linker config.
#
# This is deliberately separate from the library's own src/c64.cfg so that
# downstream projects can see what a consumer-owned link config looks like.
# The memory map matches the library's defaults because the vendored
# library still places its sqtab at $8000, its Shoup tables at $6000
# (Profile A only), and its code+data in MAIN at $0900+. A consumer that
# wants to relocate the library would need to rewrite either this cfg
# AND source-patch the table addresses in poly1305_lib.s (not recommended
# until v0.4.0 makes them configurable via -D).

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    ZP:     file = "",  start = $0002, size = $009E, type = rw;
    HEADER: file = %O,  start = $0000, size = $0002;
    STUB:   file = %O,  start = $0801, size = $00FF, fill = yes;
    MAIN:   file = %O,  start = $0900, size = $9700;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LOADADDR:  load = HEADER, type = ro;
    BASICSTUB: load = STUB,   type = ro;
    CODE:      load = MAIN,   type = ro, align = $100;
    DATA:      load = MAIN,   type = rw;
    BSS:       load = MAIN,   type = bss, define = yes;
}
